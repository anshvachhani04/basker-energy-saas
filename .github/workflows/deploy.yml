name: Basker Energy SaaS — CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_STREAMLIT: ghcr.io/${{ github.repository }}/basker-dashboard
  IMAGE_API: ghcr.io/${{ github.repository }}/basker-api

jobs:
  # ── 1. Code Quality & Tests ─────────────────────────────────
  test:
    name: 🧪 Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r streamlit_app/requirements.txt
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov flake8 black isort

      - name: Lint (flake8)
        run: flake8 . --max-line-length 120 --exclude=.git,__pycache__,*.pyc

      - name: Format check (black)
        run: black --check . --line-length 120

      - name: Run tests
        run: |
          cd tests && pytest -v --cov=../ --cov-report=xml --cov-report=term

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests

  # ── 2. ML Model Validation ──────────────────────────────────
  ml-validate:
    name: 🤖 ML Model Validation
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
      - run: pip install -r streamlit_app/requirements.txt
      - name: Validate ML models
        run: |
          python -c "
          import sys; sys.path.insert(0, 'streamlit_app')
          from ml_core import SolarDataSimulator, BaskerMLEngine
          sim = SolarDataSimulator()
          df = sim.generate_timeseries(n_days=3, freq_min=5)
          engine = BaskerMLEngine()
          ok = engine.train(df)
          assert ok, 'Training failed'
          from sklearn.metrics import r2_score
          day = df[df['ghi_wm2']>50]
          preds = engine.predict_power(day)
          r2 = r2_score(day['ac_power_kw'].values, preds)
          print(f'ML Validation: R²={r2:.4f}')
          assert r2 > 0.90, f'R² {r2:.4f} below 0.90 threshold'
          print('✅ ML validation passed')
          "

  # ── 3. Build Docker Images ──────────────────────────────────
  build:
    name: 🐳 Build & Push Images
    runs-on: ubuntu-latest
    needs: [test, ml-validate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata — Dashboard
        id: meta-dash
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_STREAMLIT }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & push Dashboard image
        uses: docker/build-push-action@v5
        with:
          context: ./streamlit_app
          push: true
          tags: ${{ steps.meta-dash.outputs.tags }}
          labels: ${{ steps.meta-dash.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata — API
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_API }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 4. Deploy to Render ─────────────────────────────────────
  deploy-render:
    name: 🚀 Deploy to Render (API)
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - name: Trigger Render deploy — API
        run: |
          curl -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID_API }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}'

      - name: Trigger Render deploy — Dashboard
        run: |
          curl -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID_DASH }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}'

  # ── 5. Smoke Test (post-deploy) ─────────────────────────────
  smoke-test:
    name: 🔍 Smoke Test Production
    runs-on: ubuntu-latest
    needs: deploy-render
    steps:
      - name: Wait for deployment
        run: sleep 60

      - name: API health check
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" https://api.baskerenergy.ai/health)
          echo "Health check status: $status"
          [ "$status" = "200" ] || exit 1

      - name: Dashboard health check
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" https://app.baskerenergy.ai/_stcore/health)
          echo "Dashboard status: $status"
          [ "$status" = "200" ] || exit 1

      - name: ML prediction test
        run: |
          curl -X POST "https://api.baskerenergy.ai/v1/predict/power" \
            -H "Authorization: Bearer demo" \
            -H "Content-Type: application/json" \
            -d '{"ghi_wm2":800,"ambient_temp_c":35,"cloud_cover_pct":10}' | \
            python3 -c "import json,sys; d=json.load(sys.stdin); \
            assert d['predicted_ac_power_kw'] > 0, 'Zero prediction!'; \
            print(f'✅ Prediction OK: {d[\"predicted_ac_power_kw\"]} kW')"

      - name: Notify Slack on success
        if: success()
        run: |
          curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"✅ Basker Energy v$(git describe --tags --abbrev=0) deployed successfully to production!\"}"

      - name: Notify Slack on failure
        if: failure()
        run: |
          curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"🚨 Basker Energy deployment FAILED — check GitHub Actions\"}"
