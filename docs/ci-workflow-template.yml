# GitHub Actions CI/CD — Basker Energy SaaS
# To activate: copy this file to .github/workflows/ci.yml
# (requires GitHub token with 'workflow' scope)

name: Basker Energy SaaS — CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: 🧪 Quality & Integration Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: ✅ Syntax check
        run: |
          python -m py_compile streamlit_app/main.py
          python -m py_compile streamlit_app/ml_core.py
          echo "Syntax OK"

      - name: ✅ ML Engine integration tests
        run: |
          cd streamlit_app
          python -c "
          import sys, warnings; warnings.filterwarnings('ignore')
          sys.path.insert(0, '.')
          from ml_core import (get_engine_and_data, generate_fleet_data,
                               compute_esg_metrics, generate_ai_recommendations)

          engine, df = get_engine_and_data()
          assert engine._trained
          m = engine.performance_metrics(df)
          assert 50 <= m['performance_ratio_pct'] <= 100
          fc = engine.forecast_dayahead(df, 24)
          assert len(fc) == 24
          fleet = generate_fleet_data()
          assert len(fleet) == 5
          esg = compute_esg_metrics(df, 10.0)
          assert esg['co2_avoided_t'] > 0
          recs = generate_ai_recommendations(df, m, 'utility')
          assert len(recs) >= 4
          print('ALL 14 INTEGRATION TESTS PASSED')
          "

      - name: ✅ Verify all 10 page modules
        run: |
          python -c "
          import ast, re
          src = open('streamlit_app/main.py').read()
          pages = re.findall(r'def (page_\w+)', src)
          assert len(pages) >= 10, f'Only {len(pages)} pages found'
          print(f'All {len(pages)} pages present:', pages)
          "

  deploy-check:
    name: 🚀 Deploy Readiness
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Confirm deploy-ready
        run: |
          echo "✅ All tests passed"
          echo "📊 Deploy dashboard: Streamlit Cloud → streamlit_app/main.py"
          echo "🔌 Deploy API: Render → backend/main.py"
          echo "🐳 Docker: docker-compose up"
