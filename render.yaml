services:
  - type: web
    name: basker-energy-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
    autoDeploy: true

  - type: web
    name: basker-energy-dashboard
    runtime: python
    rootDir: streamlit_app
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run main.py --server.port $PORT --server.headless true
    envVars:
      - key: ENV
        value: production
    autoDeploy: true
